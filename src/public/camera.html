<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>My Site</title>
    <link rel="stylesheet" href="./css/app.css" />
    <script type="module" src="./js/services/app/setup-app.js"></script>
  </head>
  <body class="app-body">
    <div id="app-header"></div>

    <main class="app-main">
      <script type="module" src="./js/services/camera/camera-app.js"></script>
      <script type="module" src="./js/services/camera/setup-camera.js"></script>

      <style>
        #photos canvas {
          width: 300px;
        }

        #video {
          width: 400px;
        }
      </style>

      <div class="app-card">
        <video id="video" autoplay playsinline></video>
      </div>

      <button id="take" class="app-btn-primary">撮影</button>

      <div class="app-card">
        <div id="photos"></div>
      </div>
    </main>

    <div id="app-footer"></div>
  </body>
</html>
